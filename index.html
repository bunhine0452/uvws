<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/32x32.png" />
    <link rel="apple-touch-icon" href="/icons/128x128.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>PySpace — Python Workspace Manager</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; background: #e7ebf3; }
      html[data-theme="dark"], html[data-theme="dark"] body { background: #070810; }
    </style>
    <script>
      /* Resolve the saved theme + glass strength before first paint (no flash). */
      (function () {
        try {
          var pref = localStorage.getItem("uvws.theme") || "system";
          var dark = pref === "dark" ||
            (pref === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          var gs = localStorage.getItem("uvws.glassStrength");
          if (gs) document.documentElement.style.setProperty("--glass-strength", gs);
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
