name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''
          # Linux: built on Ubuntu 22.04 for broad glibc/webkit2gtk-4.1 compatibility.
          # Produces .AppImage (auto-updatable) + .deb + .rpm via bundle targets "all".
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl wget file

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          ver="${{ github.ref_name }}"
          body="$(awk -v t="## ${ver}" '$0==t{f=1;next} /^## /{if(f)exit} f' CHANGELOG.md)"
          {
            echo "body<<__CHANGELOG_EOF__"
            echo "$body"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'uvws ${{ github.ref_name }}'
          releaseBody: |
            ## uvws ${{ github.ref_name }}

            ### ✨ What's new
            ${{ steps.notes.outputs.body }}

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Windows | `.msi` / `.exe` |
            | Linux | `.AppImage` / `.deb` / `.rpm` |

            ### ⚠️ macOS First Launch
            macOS may show a security warning because the app is not notarized.
            **Right-click** the app → **Open** → Click **Open** in the dialog.
            You only need to do this once.

            ### 🐧 Linux First Launch
            For the AppImage, make it executable first: `chmod +x uvws_*.AppImage`, then run it.
            (`.deb` / `.rpm` install via your package manager.) AppImage may require
            `libfuse2` on some distros: `sudo apt install libfuse2`.

            ### Prerequisites
            - [uv](https://docs.astral.sh/uv/) must be installed on your system.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

